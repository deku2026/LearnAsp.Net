name: Linux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Linux x64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      MSBUILDDISABLENODEREUSE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Verify tool versions
        run: |
          echo "dotnet:     $(dotnet --version)"
          echo "python:     $(python --version)"
          echo "pre-commit: $(pre-commit --version)"
          dotnet --list-sdks

      - name: Restore
        run: dotnet restore LearnAspNet.slnx

      - name: Build (Debug)
        run: dotnet build LearnAspNet.slnx -c Debug --no-restore

      - name: Build (Release)
        run: dotnet build LearnAspNet.slnx -c Release --no-restore

      # GitHub-hosted Ubuntu already has Docker Engine. Step09 Testcontainers uses it
      # to pull/run postgres — no local docker-compose stack install required here.
      # Future "full infra" docker tests should also live only in this Linux job.
      - name: Verify Docker (for Testcontainers)
        run: |
          docker version
          docker info >/dev/null

      - name: Test (Release)
        run: dotnet test LearnAspNet.slnx -c Release --no-build

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure --color=always
